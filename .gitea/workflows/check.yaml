name: Validate Nix Config

on:
  pull_request:
    branches: [main]

jobs:
  nix-eval:
    runs-on: nix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate system configs
        id: nix-check
        run: |
          nix flake check \
            --extra-experimental-features 'nix-command flakes' \
            2>&1 | tee /tmp/nix-check-output.txt
          echo "All system configs validated successfully"

      - name: Notify Homie for review
        if: success()
        run: |
          PR_NUMBER=$(echo '${{ toJSON(github.event.pull_request.number) }}')
          curl -s -X POST http://127.0.0.1:3456/api/review-pr \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": $PR_NUMBER}"
          echo "Notified Homie to review PR #$PR_NUMBER"

      - name: Notify Homie of failure
        if: failure()
        run: |
          PR_NUMBER=$(echo '${{ toJSON(github.event.pull_request.number) }}')
          ERROR=$(cat /tmp/nix-check-output.txt 2>/dev/null | tail -50 || echo "unknown error")
          # Escape for JSON
          ERROR_JSON=$(echo "$ERROR" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST http://127.0.0.1:3456/api/ci-failed \
            -H "Content-Type: application/json" \
            -d "{\"pr_number\": $PR_NUMBER, \"error\": $ERROR_JSON}"
          echo "Notified Homie of CI failure on PR #$PR_NUMBER"
